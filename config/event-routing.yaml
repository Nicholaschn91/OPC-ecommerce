# 事件路由规则

## 事件定义

events:
  spu_fetched:
    description: Scraper 采集完成
    publisher: scraper
    subscribers: [image-post-processor, keyword-grader]
    payload:
      - spu_id
      - feishu_record_id
      - timestamp
      - source_platform
      - image_urls
      - product_name
      - category
      - materials
      - key_features
      - variant_attributes

  images_processed:
    description: 图片后处理完成
    publisher: image-post-processor
    subscribers: [router, boss]
    payload:
      - spu_id
      - feishu_record_id
      - processed_images
      - processing_status

  keyword_snapshot_ready:
    description: 关键词库快照生成完毕
    publisher: keyword-grader
    subscribers: [router]
    payload:
      - spu_id
      - feishu_record_id
      - snapshot_yaml
      - stats: {T1, T2, T3, T4, T5}
      - build_timestamp

  keyword_prepare_failed:
    description: 无匹配词库/构建失败
    publisher: keyword-grader
    subscribers: [boss]
    payload:
      - spu_id
      - reason: "no_matching_kw_lib / build_failed"

  proposal_ready:
    description: Router 战略提案产出 + Base B 父记录创建
    publisher: router
    subscribers: [seo]
    gate: CRITICAL_STOP
    payload:
      - spu_id
      - feishu_record_id
      - parent_record_id
      - platforms
      - track
      - visual_handoff
      - variant_attribute_plan

  child_records_created:
    description: SEO 创建子记录完成（每个子记录对应 2 个变体属性，包含多个变体值组合）
    publisher: seo
    subscribers: [boss]
    gate: HUMAN_CONFIRM
    payload:
      - spu_id
      - parent_record_id
      - child_records:
          - platform: amazon
            listing_id: ""
            direction: "A1"
            variant_attrs: ["size", "color"]
            product_name_suffix: "-尺寸-颜色"
            variants:
              - size: "尺寸1"
                color: "颜色1"
              - size: "尺寸1"
                color: "颜色2"
              - size: "尺寸2"
                color: "颜色1"
              - size: "尺寸2"
                color: "颜色2"
          - platform: amazon
            listing_id: ""
            direction: "A2"
            variant_attrs: ["material", "shape"]
            product_name_suffix: "-材质-形状"
            variants:
              - material: "材质1"
                shape: "形状1"
              - material: "材质1"
                shape: "形状2"
              - material: "材质2"
                shape: "形状1"
              - material: "材质2"
                shape: "形状2"
          - platform: amazon
            listing_id: ""
            direction: "A3"
            variant_attrs: ["design", "pack_qty"]
            product_name_suffix: "-设计方案-包装数量"
            variants:
              - design: "设计方案1"
                pack_qty: "包装数量1"
              - design: "设计方案1"
                pack_qty: "包装数量2"
              - design: "设计方案2"
                pack_qty: "包装数量1"
              - design: "设计方案2"
                pack_qty: "包装数量2"
          - platform: ebay
            listing_id: ""
            direction: "B1"
            variant_attrs: ["size", "color"]
            product_name_suffix: "-尺寸-颜色"
            variants:
