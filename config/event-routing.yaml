  draft_done:
    description: 子记录初版文案完成
    publisher: seo
    subscribers: [boss]
    gate: HUMAN_CONFIRM
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - draft_field

  visual_final:
    description: 终版+视觉 Prompt 完成（合规检测前置）
    publisher: visual
    subscribers: [boss]
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - visual_prompts
      - aplus_content

  compliance_check_request:
    description: 主控分发 Dify 合规检测请求
    publisher: boss
    subscribers: [dify-compliance]
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - scan_scope: "visual_final"
      - copy_fields
      - visual_prompts
      - aplus_content

  compliance_check_result:
    description: Dify 合规检测完成
    publisher: dify-compliance
    subscribers: [boss]
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - overall_status: "通过 / 需修正 / 熔断"
      - fatal_count: 0
      - high_count: 0
      - medium_count: 0
      - details: []
      - report_field: "合规扫描报告"

  risk_hit:
    description: 合规检测命中致命级风险
    publisher: dify-compliance
    subscribers: [boss]
    action: CIRCUIT_BREAK
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - risk_level
      - keyword
      - platform_rule
      - field_name

  keyword_request:
    description: 子 Agent 向 keyword-grader 请求取词
    publisher: seo
    subscribers: [keyword-grader]
    payload:
      - spu_id
      - parent_record_id
      - child_record_id
      - platform
      - direction
      - tier
      - sort
      - top

  cs_ticket_created:
    description: 客服工单创建
    publisher: cs
    subscribers: [boss]
    payload:
      - ticket_id
      - platform
      - order_id
      - issue_type
      - priority

  cs_ticket_resolved:
    description: 客服工单解决
    publisher: cs
    subscribers: [boss]
    payload:
      - ticket_id
      - resolution
      - satisfaction_score

# 闸门定义
gates:
  CRITICAL_STOP:
    timeout: 300s
    allowed_confirmations: ["确认", "继续", "通过", "OK", "ok", "confirm", "approve"]
    on_timeout: notify_user

  HUMAN_CONFIRM:
    timeout: 300s
    allowed_confirmations: ["确认", "继续", "通过", "OK", "ok", "confirm", "approve"]
    on_timeout: notify_user

  COMPLIANCE_CONFIRM:
    timeout: 300s
    allowed_confirmations: ["确认", "继续", "通过", "OK", "ok", "confirm", "approve", "替换", "replace", "修正", "fix"]
    on_timeout: notify_user